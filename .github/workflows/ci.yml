name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable corepack (pnpm)
        run: corepack enable pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync sidecar (Python) dependencies
        working-directory: sidecar
        run: uv sync

      # @loqui/shared is the single source of truth: its TS build emits the
      # type declarations + JSON Schemas that every other workspace (and the
      # sidecar tests) resolve against. Build it before typecheck/test.
      - name: Build shared contract
        run: pnpm --filter @loqui/shared build

      # @loqui/audio's built dist (the binary frame codec) is consumed directly
      # by the audio smoke harness (scripts/smoke-audio.mjs), so build it here.
      - name: Build audio package
        run: pnpm --filter @loqui/audio build

      - name: Typecheck (TS)
        run: pnpm -r typecheck

      - name: Lint (TS)
        run: pnpm -r lint

      # Use the root `test` script (not `pnpm -r test` directly): it rebuilds the
      # shared better-sqlite3 native module to the Node ABI ONCE (apps/desktop's
      # electron-rebuild postinstall leaves it at the Electron ABI) and then runs
      # the workspaces serially, so a Node-based test never loads an Electron-ABI
      # binary and no two packages rebuild the shared module concurrently.
      - name: Test (TS)
        run: pnpm test

      - name: Lint (Python sidecar)
        working-directory: sidecar
        run: |
          uv run ruff check .
          uv run black --check .

      - name: Test (Python sidecar)
        working-directory: sidecar
        run: uv run pytest -q

      # Cross-process acceptance gate (PRD-0 AC#3): spawns the REAL sidecar via
      # uv and exercises the handshake / token / schema-validation / shutdown
      # seams over the real wire — including that the client's token-less request
      # envelope is accepted and a token-bearing one is rejected, and that
      # stdin-EOF triggers graceful parent-exit shutdown. Needs uv + the built
      # shared dist, both already present in this job.
      - name: Smoke (foundation cross-process contract)
        run: pnpm smoke:foundation

      # PRD-1 acceptance gate (headless): spawns the REAL sidecar with a temp
      # LOQUI_DATA_DIR, streams SYNTHETIC pcm_s16le frames for mic AND system
      # (encoded with the real @loqui/audio codec) over the WS as binary, then
      # asserts mic.wav + system.wav are 16 kHz/mono/16-bit, ~the expected
      # duration, and NOT identical (the two streams stayed independent).
      - name: Smoke (audio capture path)
        run: pnpm smoke:audio

      # PRD-2 acceptance gate (headless, hermetic): spawns the REAL sidecar with
      # LOQUI_FAKE_ASR=1 (deterministic streaming FAKE backend — NO model, NO
      # network) + a temp LOQUI_DATA_DIR, streams SYNTHETIC marker pcm_s16le for
      # mic AND system through the REAL streaming pipeline (VAD -> ASR ->
      # LocalAgreement-2), then asserts transcriptSegment notifications arrive
      # with partial-then-final, the correct per-source text, no cross-wiring,
      # and a single final segId per utterance.
      - name: Smoke (transcription path)
        run: pnpm smoke:transcription

      # PRD-3 acceptance gate (headless, hermetic): spawns the REAL sidecar with
      # LOQUI_FAKE_ASR=1 + a temp LOQUI_DATA_DIR, then drives the REAL
      # main-process PRD-3 modules (MeetingStore, the append-only
      # TranscriptWriter, the final-segment consumer, the lifecycle controller)
      # end-to-end: start a meeting, stream SYNTHETIC marker PCM for mic+system,
      # assert transcript.live.md gains BOTH a "You said:" and a "They said:"
      # line + meta.json + an FTS row exist, then stop (status done, endedAt set)
      # and assert listMeetings returns it and searchMeetings finds a spoken
      # keyword. Runs after the test step so better-sqlite3 is built for the node
      # ABI (the smoke runs the store under plain node via tsx).
      - name: Smoke (meeting end-to-end)
        run: pnpm smoke:meeting

      # PRD-4 acceptance gate (headless, hermetic): spawns the REAL sidecar with
      # LOQUI_FAKE_CHAT=1 + a temp LOQUI_DATA_DIR, seeds a transcript.live.md,
      # then drives the REAL chat path end-to-end over the WS control channel
      # (chatRequest -> app.py dispatch -> handle_chat -> READ-ONLY transcript
      # context -> FakeChatProvider stream). Asserts chatToken deltas arrive and
      # reference the seeded content, then a single chatDone, and — the
      # cross-cutting invariant — that transcript.live.md is BYTE-IDENTICAL after
      # the chat (the AI never edits the transcript). No model/key/CLI/network.
      - name: Smoke (chat end-to-end)
        run: pnpm smoke:chat

      # PRD-5 acceptance gate (headless, hermetic): spawns the REAL sidecar with
      # LOQUI_FAKE_ASR=1 + LOQUI_FAKE_CHAT=1 + LOQUI_FAKE_DIARIZER=1 + a temp
      # LOQUI_DATA_DIR, drives a meeting to write the WALs/WAVs, seeds the
      # READ-ONLY structured + live transcript, then drives the REAL post-process
      # path end-to-end over the WS control channel (postProcess -> app.py
      # dispatch -> run_postprocess -> FakeDiarizer + pure alignment ->
      # transcript.diarized.{json,md} -> FakeChatProvider summary -> summary.json
      # -> postProcessDone). Asserts JobUpdate progress for diarization + summary,
      # the diarized files carry "You" + >= 2 "Speaker N" labels, summary.json +
      # a searchable indexText, and — the cross-cutting invariant — that
      # transcript.live.md AND transcript.jsonl are BYTE-IDENTICAL after the whole
      # pipeline (diarization + summary write only the derived files). No
      # model/torch/pyannote/HF token/key/network/devices.
      - name: Smoke (post-process end-to-end)
        run: pnpm smoke:postprocess

      # PRD-7 acceptance gate (hermetic, no Electron, no network beyond the
      # loopback stdio pipe): seeds a temp LOQUI_DATA_DIR that mirrors the app
      # writer's index.db FTS schema + per-meeting file layout (the SAME
      # @loqui/shared layout constants the reader uses), builds + spawns the REAL
      # standalone `loqui-mcp` bin over stdio with the app CLOSED, drives it with
      # the official MCP SDK client, and asserts: the initialize handshake, that
      # tools/list is EXACTLY the 5 read-only tools with NO mutator, that
      # search_meetings finds a keyword across BOTH the transcript and summary
      # FTS columns (with a snippet), that get_transcript + get_summary return
      # the seeded content, and — the read-only invariant — that a write-style
      # tool call (delete_meeting) has no available code path (rejected). Runs
      # after the test step so better-sqlite3 + the mcp-server dist are built for
      # the node ABI. Runs on ALL OSes — the Windows failure was a real bug in the
      # bin's POSIX-only entrypoint guard (loqui-mcp never started on Windows),
      # now fixed via pathToFileURL.
      - name: Smoke (MCP server stdio, read-only)
        run: pnpm smoke:mcp

      # PRD-15 calendar Home/Today smoke (hermetic; FakeCalendarProvider, NO
      # network, no Electron). Drives the REAL calendar service + token store +
      # meeting store: connect (fake) -> listToday (merged, de-duped,
      # soonest-first with platform+joinUrl) -> "join & record" (a meeting linked
      # to the event, meetingId set, shown in the Library) and asserts the
      # read-only invariants (no calendar file beyond calendar-tokens.json, no
      # transcript.live.md written, an existing transcript stays byte-identical).
      # Runs after the test step so better-sqlite3 is built for the node ABI.
      - name: Smoke (calendar Home/Today, hermetic)
        run: pnpm smoke:calendar

      # PRD-6 Google-Meet speaker-name attribution smoke (hermetic; no Electron,
      # no live Meet, NO network beyond a 127.0.0.1 listener it asserts is
      # loopback-only). Drives the REAL main-process seam cross-process: boots the
      # real loopback extension WS server, connects a real `ws` client over
      # 127.0.0.1 (asserting the bound addr is 127.0.0.1 and an arbitrary website
      # Origin is refused on the upgrade), pushes hello+activity ONLY while a
      # meeting is active (the no-active-meeting invariant), drains, runs the PURE
      # correlateSpeakerNames over a seeded diarized transcript, applies via the
      # REAL applier (REUSING the PRD-5 rewrite path), and asserts the resolved
      # names land in transcript.diarized.{json,md} + meta.participants while
      # transcript.live.md AND transcript.jsonl stay BYTE-IDENTICAL. Also asserts
      # GRACEFUL DEGRADATION (absent extension => generic `Speaker N`, no crash)
      # and that an ambiguous turn stays `Speaker N`. Runs after the test step so
      # better-sqlite3 is built for the node ABI.
      - name: Smoke (speaker names, Google Meet, hermetic)
        run: pnpm smoke:speakernames

  e2e:
    name: e2e / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync sidecar (Python) dependencies
        working-directory: sidecar
        run: uv sync

      - name: Build shared contract
        run: pnpm --filter @loqui/shared build

      - name: Build audio package
        run: pnpm --filter @loqui/audio build

      # Full-app Electron E2E: launches the REAL built app against the fake-ASR
      # sidecar and asserts the renderer -> preload(contextBridge) -> main IPC ->
      # sidecar(WS) seam (window mounts, window.loqui exposed with no Node leak,
      # sidecar reaches healthy + ping round-trips). Catches integration bugs
      # unit tests (which mock window.loqui) cannot — e.g. a broken preload path
      # or sidecar launch resolution. Real audio capture stays manual.
      - name: Build desktop app
        run: pnpm --filter @loqui/desktop build

      - name: E2E (Playwright + Electron)
        run: pnpm --filter @loqui/desktop test:e2e
