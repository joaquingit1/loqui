# PRD-8 — release automation: on a `v*` tag, build per-platform update-channel
# artifacts (unsigned), compute sha256s, generate `version.json`, and publish a
# GitHub Release with all assets.
#
# The custom self-updater (apps/desktop/src/main/updater) fetches the latest
# release's `version.json`, semver-compares, downloads the platform asset, and
# sha256-verifies it before swapping — so integrity rides entirely on the
# checksums published here (no code-signing cert required; see SIGNING.md to add
# one later with NO updater changes).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # v1 is macOS Apple-Silicon only (arm64). Windows + Intel are deferred to a
        # later release that adds the matching runners (the PyInstaller sidecar +
        # Swift helper are arch/OS-specific and can't cross-compile). macos-latest
        # is Apple Silicon and ships full Xcode (needed for the FoundationModels
        # helper build below).
        os: [macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync sidecar (Python) dependencies
        working-directory: sidecar
        run: uv sync

      # @loqui/shared emits the type decls + JSON Schemas every workspace builds
      # against — build it first.
      - name: Build shared contract
        run: pnpm --filter @loqui/shared build

      - name: Build audio package
        run: pnpm --filter @loqui/audio build

      # Build the standalone MCP server (its dist/bin is staged into the bundle).
      - name: Build MCP server
        run: pnpm --filter @loqui/mcp-server build

      # electron-vite -> out/{main,preload,renderer}. The Google OAuth client
      # id/secret are baked into the main bundle here from repo Actions secrets
      # (electron.vite.config.ts `define`) — they are never committed to source.
      - name: Build desktop app
        run: pnpm --filter @loqui/desktop build
        env:
          LOQUI_GOOGLE_CLIENT_ID: ${{ secrets.LOQUI_GOOGLE_CLIENT_ID }}
          LOQUI_GOOGLE_CLIENT_SECRET: ${{ secrets.LOQUI_GOOGLE_CLIENT_SECRET }}

      # Build the macOS native Swift helper (Apple Speech ASR + Apple Foundation
      # Models summaries). electron-builder copies it via extraResources
      # (native/macos/.build/release/loqui-asr-helper); without this the package
      # step fails on the missing `from:` path. macos-latest has full Xcode, so the
      # FoundationModels compile succeeds.
      - name: Build native helper (Swift)
        run: pnpm --filter @loqui/desktop run build:helper

      # Stage the bundled Python sidecar + MCP runtime under
      # apps/desktop/build/runtime/{sidecar,mcp} (PyInstaller onedir for the
      # sidecar; the built MCP bin for mcp). electron-builder picks these up via
      # extraResources (see electron-builder.yml).
      - name: Stage bundled runtime (sidecar + MCP)
        run: pnpm --filter @loqui/desktop run build:runtime

      # Package the UNSIGNED update-channel artifacts (+ optional DMG/NSIS).
      # No signing env is set, so electron-builder produces unsigned output.
      - name: Package (electron-builder, unsigned)
        working-directory: apps/desktop
        run: pnpm exec electron-builder --publish never
        env:
          # Belt-and-suspenders: ensure no accidental signing/notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # The updater consumes the .zip; humans download the .dmg. Carry both to the
      # publish job so both reach the GitHub Release.
      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            apps/desktop/dist-app/*.zip
            apps/desktop/dist-app/*.dmg
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Generate the `version.json` manifest (sha256 + size + URL per platform).
      - name: Generate version.json
        run: |
          node scripts/gen-version-json.mjs \
            --version "${{ steps.ver.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --artifacts-dir dist \
            --out dist/version.json \
            --notes "Release ${{ github.ref_name }}"

      - name: Verify version.json platform assets
        run: |
          node <<'NODE'
          const fs = require("fs");
          const manifest = JSON.parse(fs.readFileSync("dist/version.json", "utf8"));
          // v1 ships macOS arm64 only; add darwin-x64 / win32-x64 here when those
          // build runners are reintroduced.
          const expected = ["darwin-arm64"];
          const missing = expected.filter((key) => !manifest.platforms?.[key]);
          if (missing.length > 0) {
            console.error(`version.json missing platform asset(s): ${missing.join(", ")}`);
            process.exit(1);
          }
          NODE

      - name: Create GitHub Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.dmg
            dist/version.json
