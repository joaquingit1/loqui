# PRD-8 — electron-builder packaging config.
#
# Produces, per platform:
#   - the UPDATE-CHANNEL artifact the self-updater consumes:
#       macOS   -> a zipped `.app` (per-arch: arm64 + x64)
#       Windows -> a portable zip
#     (a zip/folder self-replaces far more easily than a DMG/NSIS — see PRD-8).
#   - an OPTIONAL first-time human-download installer (DMG on macOS, NSIS on
#     Windows). The updater never touches these; they're for the initial install.
#
# The Python sidecar + the MCP server are bundled as `extraResources` (see the
# build script: scripts/build-runtime.* stages them under build/runtime/ first),
# so a packaged app needs NO uv/Python/node on the user's machine. The main
# process resolves these via process.resourcesPath (see src/main/updater/paths.ts).
#
# UNSIGNED-FIRST: no `identity` / `certificateFile` here, so the build is unsigned
# (works today, with a one-time first-launch approval). Adding a Developer ID /
# Windows cert later requires NO updater code change.

appId: app.loqui.desktop
productName: Loqui
copyright: Copyright © 2026 Joaquin Castellano and contributors

# macOS signing durability: `codesign --deep` does NOT sign executables under
# Contents/Resources/, so the bundled ScreenCaptureKit helper never inherits the
# app's identity and its ad-hoc identifier drifts every build — breaking the
# Screen Recording (TCC) grant, which macOS keys to code identity. This hook
# signs the helper INSIDE-OUT with the app's identity (helper first, then re-seals
# the app) after packaging. Path is relative to this config's app dir.
afterPack: build/after-pack.cjs

# electron-vite emits the app into out/{main,preload,renderer}; package those.
directories:
  output: dist-app
  buildResources: build

files:
  - out/**/*
  - package.json

# The bundled runtime (sidecar + MCP) + the update helper scripts. The build
# script stages the PyInstaller/onedir trees under build/runtime/{sidecar,mcp}
# before electron-builder runs.
extraResources:
  # The macOS native helper (Apple Speech ASR + Apple Foundation Models summaries).
  # main/index.ts points LOQUI_ASR_HELPER_BIN at <Resources>/native/loqui-asr-helper.
  # Built (arm64) by `pnpm build:helper` before electron-builder runs.
  - from: native/macos/.build/release/loqui-asr-helper
    to: native/loqui-asr-helper
  - from: ../../build-helpers
    to: build-helpers
    filter:
      - update-helper.ps1
      - update-helper.sh
  - from: build/runtime/sidecar
    to: sidecar
    filter:
      - "**/*"
  - from: build/runtime/mcp
    to: mcp
    filter:
      - "**/*"

# macOS: a zipped .app (the update channel) + an optional DMG. v1 ships Apple
# Silicon (arm64) ONLY — the PyInstaller sidecar + Swift helper are arch-specific
# and can't cross-compile, so x64 (and Windows) are deferred to a later release
# that adds the matching CI runners.
mac:
  category: public.app-category.productivity
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
  # Unsigned: do not auto-discover an identity (keep the build cert-free).
  identity: null
  # Harden the runtime later when notarizing; harmless unsigned.
  hardenedRuntime: false
  # macOS permission purpose strings shown in the system prompts. Screen
  # Recording is what gates SYSTEM-audio ("They") capture via the loopback path;
  # without an explicit string the prompt UX degrades on recent macOS.
  extendInfo:
    NSMicrophoneUsageDescription: Loqui records your microphone ("You") to transcribe meetings on your device.
    NSScreenCaptureUsageDescription: Loqui needs Screen Recording permission to capture the other participants' audio ("They") from your system output. It records audio only.

# Artifact names embed the version + arch so the release `version.json` URLs are
# stable + predictable (the generator composes them from the tag + these names).
artifactName: ${productName}-${version}-${arch}-${os}.${ext}
